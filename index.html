<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airflow Social Media</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg,#e6f0ff,#ffffff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    max-width:420px;
    width:90%;
    background:#fff;
    padding:35px 28px;
    border-radius:22px;
    box-shadow:0 12px 35px rgba(0,0,0,0.18);
    text-align:center;
}

.logo{
    font-size:34px;
    font-weight:bold;
    margin-bottom:8px;
}

.logo span{
    color:#e11b22;
}

.subtitle{
    color:#555;
    margin-bottom:22px;
}

.btn{
    display:block;
    text-decoration:none;
    padding:15px;
    margin:14px 0;
    border-radius:12px;
    color:#fff;
    font-weight:bold;
    transition:.25s;
    font-size:17px;
}

.btn:hover{
    transform:scale(1.05);
}

.linkedin{background:#0077b5;}
.instagram{background:#e1306c;}
.facebook{background:#1877f2;}

.footer{
    text-align:center;
    margin-top:18px;
    font-size:13px;
    color:#777;
}
</style>
</head>

<body>

<div class="card">
    <div class="logo"><span>AIRFLOW</span></div>
    <div class="subtitle">Follow us on social media</div>

    <a class="btn linkedin"
       href="https://www.linkedin.com/company/m-s-air-flow-pvt--ltd-/"
       target="_blank">🔗 LinkedIn</a>

    <a class="btn instagram"
       href="https://www.instagram.com/airflowindia?igsh=MWxob2h2Zzk4OWRoMw=="
       target="_blank">📸 Instagram</a>

    <a class="btn facebook"
       href="https://www.facebook.com/airflowindia"
       target="_blank">👍 Facebook</a>

    <div class="footer">© Airflow Pvt Ltd</div>
</div>

</body>
</html>
